<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="Equipotential bonding wiring diagram">
  <g fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round">
    <rect x="30" y="120" width="120" height="80" rx="6"/>
    <!-- DUT with two accessible metal parts -->
    <rect x="300" y="80" width="150" height="140" rx="6"/>
    <rect x="320" y="100" width="40" height="30" rx="3" stroke="#94a3b8"/>
    <rect x="390" y="170" width="40" height="30" rx="3" stroke="#94a3b8"/>
    <!-- bonding straps -->
    <path d="M150 145 H300" stroke="#f87171"/>
    <path d="M150 175 H280 V185 H300"/>
    <!-- internal bond between metal parts -->
    <path d="M360 115 H410 V170" stroke="#34d399"/>
    <!-- earth -->
    <path d="M90 200 V236 M72 236 H108 M79 244 H101 M86 252 H94" stroke="#34d399"/>
  </g>
  <g fill="#e2e8f0" font-family="sans-serif" font-size="13">
    <text x="90" y="112" text-anchor="middle">bonding tester</text>
    <text x="375" y="72" text-anchor="middle">DUT metal parts</text>
    <text x="225" y="138" text-anchor="middle" font-size="10" fill="#f87171">strap A</text>
    <text x="225" y="198" text-anchor="middle" font-size="10" fill="#cbd5e1">strap B</text>
    <text x="385" y="150" text-anchor="middle" font-size="10" fill="#34d399">internal bond</text>
  </g>
  <text x="240" y="294" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">DRAFT — replace with reviewed CAD</text>
</svg>
