<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="PID chamber wiring diagram">
  <g fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round">
    <rect x="250" y="50" width="200" height="200" rx="8" stroke="#a78bfa"/>
    <rect x="290" y="110" width="120" height="80" rx="6"/>
    <!-- HV bias supply -->
    <rect x="30" y="110" width="120" height="80" rx="6"/>
    <!-- HV to shorted leads -->
    <path d="M150 135 H290" stroke="#f87171"/>
    <!-- HV to frame -->
    <path d="M150 175 H230 V232 H350 V222" stroke="#fbbf24"/>
    <!-- ground reference -->
    <path d="M350 190 V222" stroke="#34d399"/>
    <path d="M332 222 H368 M339 230 H361 M346 238 H354" stroke="#34d399"/>
  </g>
  <g fill="#e2e8f0" font-family="sans-serif" font-size="13">
    <text x="90" y="150" text-anchor="middle">HV bias ±1000 V</text>
    <text x="90" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">85 °C / 85% RH</text>
    <text x="350" y="44" text-anchor="middle" fill="#a78bfa">PID chamber</text>
    <text x="350" y="155" text-anchor="middle" font-size="11">DUT cells</text>
    <text x="220" y="128" text-anchor="middle" font-size="10" fill="#f87171">shorted leads</text>
    <text x="250" y="226" text-anchor="middle" font-size="10" fill="#fbbf24">HV to frame</text>
  </g>
  <text x="240" y="294" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">DRAFT — replace with reviewed CAD</text>
</svg>
