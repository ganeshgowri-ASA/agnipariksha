<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="Electroluminescence forward bias wiring diagram">
  <g fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round">
    <!-- PSU forward bias -->
    <rect x="30" y="120" width="120" height="80" rx="6"/>
    <!-- DUT -->
    <rect x="240" y="90" width="120" height="120" rx="6"/>
    <!-- forward current leads -->
    <path d="M150 145 H240" stroke="#f87171"/>
    <path d="M150 175 H240"/>
    <path d="M150 160 H220" stroke="#60a5fa" stroke-dasharray="6 5"/>
    <!-- EL camera -->
    <rect x="410" y="120" width="50" height="60" rx="4" stroke="#a78bfa"/>
    <path d="M410 135 l-40 15 l40 15 z" stroke="#a78bfa"/>
    <!-- ground -->
    <path d="M300 210 V240 M282 240 H318 M289 248 H311 M296 256 H304" stroke="#34d399"/>
  </g>
  <g fill="#e2e8f0" font-family="sans-serif" font-size="13">
    <text x="90" y="165" text-anchor="middle">PSU fwd bias</text>
    <text x="90" y="182" text-anchor="middle" font-size="10" fill="#94a3b8">≈ Isc, dark room</text>
    <text x="300" y="82" text-anchor="middle">DUT</text>
    <text x="435" y="112" text-anchor="middle" font-size="11" fill="#a78bfa">EL cam</text>
    <text x="195" y="138" text-anchor="middle" font-size="10" fill="#f87171">force</text>
    <text x="190" y="155" text-anchor="middle" font-size="10" fill="#60a5fa">sense</text>
  </g>
  <text x="240" y="294" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">DRAFT — replace with reviewed CAD</text>
</svg>
