name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: |
          # Run pytest if any tests exist, otherwise no-op so CI stays green
          if compgen -G "test_*.py" > /dev/null || compgen -G "**/test_*.py" > /dev/null || [ -d tests ]; then
            pytest -q
          else
            echo "No backend tests yet — skipping pytest."
          fi

  frontend:
    name: Frontend — next build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live

  e2e:
    name: E2E — Playwright smoke
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install test deps
        working-directory: tests
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        env:
          CI: "true"
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live
        run: npm test

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7
