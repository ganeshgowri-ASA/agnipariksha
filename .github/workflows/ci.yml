name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Import-path smoke test
        run: pytest -q tests/test_import_paths.py
      - name: pytest
        # `--reruns 2 --reruns-delay 1` mitigates the WS-lifecycle race in
        # test_ws_lifecycle.py that has hit PR #110/#111/#114/#125 — see
        # Notion runbook 2026-05-29. Other intermittent CancelledError
        # races picked up by rerunfailures are also flagged in the report.
        # When the underlying race is fully fixed remove these flags.
        run: pytest -q --reruns 2 --reruns-delay 1

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci --no-audit --no-fund
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npx next build

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:65535

  smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Smoke test
        run: bash scripts/smoke.sh

  matlab-model:
    # Verifies the MATLAB/Simulink DC-PSU model still matches the Python
    # plant (reference_trace.csv) using GNU Octave — no MATLAB license needed.
    # Guards the cross-language parity that backend/tests/test_psu_trace.py
    # pins from the Python side.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Octave
        run: sudo apt-get update && sudo apt-get install -y octave
      - name: MATLAB model parity (plant + Simulink design vs Python reference)
        run: bash matlab/tests/run_octave_checks.sh
